<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Billy Miners</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #c0c0c0;
  font-family: 'Arial', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: #c0c0c0;
  border-bottom: 3px solid #808080;
  border-top: 3px solid #ffffff;
  border-left: 3px solid #ffffff;
  border-right: 3px solid #808080;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 8px;
}

.title-block { display: flex; flex-direction: column; line-height: 1; }
.title-top { font-size: 9px; font-weight: bold; color: #000080; letter-spacing: 1px; text-transform: uppercase; }
.title-bottom { font-size: 14px; font-weight: 900; font-style: italic; text-transform: uppercase; color: #000; }

.diff-group { display: flex; gap: 4px; }
.diff-btn {
  padding: 3px 8px;
  font-size: 11px;
  font-weight: bold;
  background: #c0c0c0;
  color: #000;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.diff-btn.active {
  border-top: 2px solid #808080;
  border-left: 2px solid #808080;
  border-bottom: 2px solid #ffffff;
  border-right: 2px solid #ffffff;
  background: #b0b0b0;
}
.diff-btn:hover:not(.active) { background: #d0d0d0; }

.hud {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lcd {
  background: #000;
  color: #ff0000;
  font-family: 'Courier New', monospace;
  font-size: 20px;
  font-weight: bold;
  padding: 2px 6px;
  border: 2px inset #808080;
  min-width: 52px;
  text-align: center;
  letter-spacing: 2px;
}
.lcd-label { font-size: 9px; color: #444; text-align: center; text-transform: uppercase; }

.reset-btn {
  width: 32px; height: 32px;
  background: #c0c0c0;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.reset-btn:active {
  border-top: 2px solid #808080;
  border-left: 2px solid #808080;
  border-bottom: 2px solid #ffffff;
  border-right: 2px solid #ffffff;
}

.mode-toggle {
  display: flex;
  border: 2px solid #808080;
  overflow: hidden;
  border-radius: 2px;
}
.mode-btn {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: bold;
  cursor: pointer;
  background: #c0c0c0;
  color: #444;
  border: none;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  user-select: none;
}
.mode-btn.active {
  background: #808080;
  color: #fff;
  border-top: 2px solid #606060;
  border-left: 2px solid #606060;
  border-bottom: 2px solid #d0d0d0;
  border-right: 2px solid #d0d0d0;
}
.mode-btn:hover:not(.active) { background: #d0d0d0; }

#hint-btn {
  padding: 3px 8px;
  font-size: 11px;
  font-weight: bold;
  background: #c0c0c0;
  color: #000;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  cursor: pointer;
}
#hint-btn.active { background: #ffff00; }

#viewport {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 10px;
}

#game-panel {
  background: #c0c0c0;
  border-top: 3px solid #ffffff;
  border-left: 3px solid #ffffff;
  border-bottom: 3px solid #808080;
  border-right: 3px solid #808080;
  padding: 6px;
  display: inline-block;
}

#grid {
  display: grid;
  gap: 1px;
  background: #808080;
  border: 2px inset #808080;
}

.cell {
  width: 24px; height: 24px;
  background: #c0c0c0;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-bottom: 2px solid #808080;
  border-right: 2px solid #808080;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900;
  font-family: Arial, sans-serif;
  user-select: none; cursor: pointer;
}
.cell:hover:not(.revealed):not(.flagged) { background: #d8d8d8; }
.cell.revealed {
  background: #c0c0c0;
  border: 1px solid #808080;
  cursor: default;
}
.cell.revealed.has-neighbors { cursor: pointer; }
.cell.flagged::after { content: "🚩"; font-size: 13px; }
.cell.mine { background: #ff0000 !important; }
.cell.mine::after { content: "💣"; font-size: 14px; }
.cell.mine-normal { background: #c0c0c0 !important; }
.cell.mine-normal::after { content: "💣"; font-size: 14px; }

.n-1 { color: #0000ff; }
.n-2 { color: #008000; }
.n-3 { color: #ff0000; }
.n-4 { color: #000080; }
.n-5 { color: #800000; }
.n-6 { color: #008080; }
.n-7 { color: #000000; }
.n-8 { color: #808080; }

#modal-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-box {
  background: #c0c0c0;
  border-top: 3px solid #ffffff;
  border-left: 3px solid #ffffff;
  border-bottom: 3px solid #808080;
  border-right: 3px solid #808080;
  padding: 20px 28px;
  text-align: center;
  min-width: 220px;
}
.modal-box h2 { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
.modal-box p { font-size: 13px; color: #333; margin-bottom: 12px; }
.modal-img { max-width: 200px; max-height: 160px; object-fit: contain; margin-bottom: 10px; display: none; }
.countdown { font-size: 12px; color: #000080; font-weight: bold; }

.win-title { color: #000080; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <div class="title-block">
      <span class="title-top" id="title-top">Billy</span>
      <span class="title-bottom" id="title-bottom">Miners</span>
    </div>
    <div class="diff-group">
      <button onclick="changeDifficulty('beginner')" id="btn-beginner" class="diff-btn active">Beg</button>
      <button onclick="changeDifficulty('intermediate')" id="btn-intermediate" class="diff-btn">Int</button>
      <button onclick="changeDifficulty('expert')" id="btn-expert" class="diff-btn">Exp</button>
    </div>
  </div>

  <div class="hud">
    <div class="mode-toggle">
      <button id="mode-dig" class="mode-btn active" onclick="setMode('dig')">⛏ Dig</button>
      <button id="mode-flag" class="mode-btn" onclick="setMode('flag')">🚩 Flag</button>
    </div>

    <button id="hint-btn" onclick="toggleHintMode()" title="Hint">💡</button>

    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="lcd" id="mine-count">010</div>
      <div class="lcd-label">Mines</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="lcd" id="timer">000</div>
      <div class="lcd-label">Time</div>
    </div>

    <button class="reset-btn" id="reset-btn">🙂</button>
  </div>
</header>

<div id="viewport" style="position:relative;">
  <div id="game-panel">
    <div id="grid"></div>
  </div>
  <div id="modal-overlay">
    <div class="modal-box">
      <h2 id="modal-title">BOOM!</h2>
      <img id="failure-pic" src="/Users/billybobby/minesweeper/picture/Media (3).jpeg" alt="" class="modal-img">
      <p id="modal-msg">Billy hit a mine.</p>
      <div class="countdown" id="restart-countdown"></div>
    </div>
  </div>
</div>

<script>
const TIERS = {
  beginner:     { w: 9,  h: 9,  m: 10 },
  intermediate: { w: 16, h: 16, m: 40 },
  expert:       { w: 30, h: 16, m: 99 }
};

let currentTier = 'beginner';
let autoRestartTimeout = null;
let autoRestartInterval = null;
let currentMode = 'dig';

const state = {
  grid: [], isGameOver: false, isTimerRunning: false,
  isHintMode: false, hasRevealedAny: false,
  timer: 0, timerInterval: null, flags: 0, revealedCount: 0
};

const dom = {
  grid: document.getElementById('grid'),
  mineDisplay: document.getElementById('mine-count'),
  timerDisplay: document.getElementById('timer'),
  resetBtn: document.getElementById('reset-btn'),
  hintBtn: document.getElementById('hint-btn'),
  modal: document.getElementById('modal-overlay'),
  modalTitle: document.getElementById('modal-title'),
  modalMsg: document.getElementById('modal-msg'),
  failurePic: document.getElementById('failure-pic'),
  countdown: document.getElementById('restart-countdown'),
  titleTop: document.getElementById('title-top'),
  titleBottom: document.getElementById('title-bottom'),
  modeDig: document.getElementById('mode-dig'),
  modeFlag: document.getElementById('mode-flag')
};

function setMode(m) {
  currentMode = m;
  dom.modeDig.classList.toggle('active', m === 'dig');
  dom.modeFlag.classList.toggle('active', m === 'flag');
}

function init() {
  clearAutoRestart();
  clearInterval(state.timerInterval);
  const { w, h, m } = TIERS[currentTier];

  Object.assign(state, {
    grid: [], isGameOver: false, isTimerRunning: false,
    isHintMode: false, hasRevealedAny: false,
    timer: 0, flags: 0, revealedCount: 0
  });

  dom.titleTop.innerText = 'Billy';
  dom.titleTop.className = 'title-top';
  dom.titleBottom.innerText = 'Miners';
  dom.titleBottom.className = 'title-bottom';
  dom.timerDisplay.innerText = '000';
  dom.mineDisplay.innerText = String(m).padStart(3, '0');
  dom.modal.style.display = 'none';
  dom.failurePic.style.display = 'none';
  dom.hintBtn.classList.remove('active');
  dom.resetBtn.innerText = '🙂';
  setMode('dig');

  dom.grid.style.gridTemplateColumns = `repeat(${w}, 24px)`;
  dom.grid.style.gridTemplateRows = `repeat(${h}, 24px)`;
  dom.grid.innerHTML = '';

  for (let i = 0; i < w * h; i++) {
    state.grid.push({ type: 'empty', revealed: false, flagged: false, count: 0 });
    const c = document.createElement('div');
    c.className = 'cell'; c.id = `c-${i}`; c.dataset.index = i;
    dom.grid.appendChild(c);
  }

  let placed = 0;
  while (placed < m) {
    const idx = Math.floor(Math.random() * state.grid.length);
    if (state.grid[idx].type === 'empty') { state.grid[idx].type = 'mine'; placed++; }
  }
  for (let i = 0; i < state.grid.length; i++) {
    if (state.grid[i].type === 'mine') continue;
    state.grid[i].count = getNeighbors(i).filter(n => state.grid[n].type === 'mine').length;
  }
}

function getNeighbors(idx) {
  const { w, h } = TIERS[currentTier];
  const n = [], x = idx % w, y = Math.floor(idx / w);
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    if (!dx && !dy) continue;
    const nx = x + dx, ny = y + dy;
    if (nx >= 0 && nx < w && ny >= 0 && ny < h) n.push(ny * w + nx);
  }
  return n;
}

function checkFirstMove() {
  if (!state.isTimerRunning) { state.isTimerRunning = true; startTimer(); }
}

function toggleHintMode() {
  if (state.isGameOver) return;
  state.isHintMode = !state.isHintMode;
  dom.hintBtn.classList.toggle('active', state.isHintMode);
}

function useHint(idx) {
  checkFirstMove();
  const area = [idx, ...getNeighbors(idx)];
  const hiddenMine = area.find(n => state.grid[n].type === 'mine' && !state.grid[n].revealed && !state.grid[n].flagged);
  if (hiddenMine !== undefined) toggleFlag(hiddenMine);
  state.isHintMode = false;
  dom.hintBtn.classList.remove('active');
}

function reveal(idx) {
  if (state.isGameOver) return;
  const isPureFirst = !state.hasRevealedAny;
  checkFirstMove();
  const s = state.grid[idx];
  if (s.revealed || s.flagged) return;
  if (s.type === 'mine') {
    if (isPureFirst) { init(); return; }
    else { endGame(false); return; }
  }
  state.hasRevealedAny = true;
  const q = [idx];
  while (q.length > 0) {
    const ci = q.shift(), cur = state.grid[ci];
    if (cur.revealed || cur.flagged) continue;
    cur.revealed = true; state.revealedCount++;
    const el = document.getElementById(`c-${ci}`);
    el.classList.add('revealed');
    if (cur.count > 0) {
      el.innerText = cur.count;
      el.classList.add(`n-${cur.count}`, 'has-neighbors');
    } else {
      getNeighbors(ci).forEach(n => { if (!state.grid[n].revealed) q.push(n); });
    }
  }
  const { w, h, m } = TIERS[currentTier];
  if (state.revealedCount === (w * h) - m) endGame(true);
}

function chord(idx) {
  const s = state.grid[idx];
  if (!s.revealed || s.count === 0) return;
  const nb = getNeighbors(idx);
  // Only auto-reveal if flagged neighbors exactly match the number
  if (nb.filter(n => state.grid[n].flagged).length === s.count)
    nb.forEach(n => { if (!state.grid[n].revealed && !state.grid[n].flagged) reveal(n); });
}

function toggleFlag(idx) {
  if (state.isGameOver || state.grid[idx].revealed) return;
  checkFirstMove();
  state.grid[idx].flagged = !state.grid[idx].flagged;
  const el = document.getElementById(`c-${idx}`);
  if (state.grid[idx].flagged) { el.classList.add('flagged'); state.flags++; }
  else { el.classList.remove('flagged'); state.flags--; }
  const { m } = TIERS[currentTier];
  dom.mineDisplay.innerText = String(Math.max(0, m - state.flags)).padStart(3, '0');
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timer++;
    dom.timerDisplay.innerText = String(Math.min(999, state.timer)).padStart(3, '0');
  }, 1000);
}

function endGame(win) {
  state.isGameOver = true;
  state.isHintMode = false;
  dom.hintBtn.classList.remove('active');
  clearInterval(state.timerInterval);

  state.grid.forEach((c, i) => {
    const el = document.getElementById(`c-${i}`);
    if (c.type === 'mine') {
      if (win) el.classList.add('mine-normal');
      else el.classList.add('mine');
    }
  });

  if (win) {
    dom.resetBtn.innerText = '😎';
    dom.titleTop.innerText = 'EZ';
    dom.titleTop.className = 'title-top win-title';
    dom.titleBottom.innerText = 'GAME';
    dom.titleBottom.className = 'title-bottom win-title';
  } else {
    dom.resetBtn.innerText = '😵';
    // Jump scare: fullscreen picture for 0.5s then restart
    dom.modal.style.display = 'flex';
    dom.modalTitle.style.display = 'none';
    dom.modalMsg.style.display = 'none';
    dom.countdown.style.display = 'none';
    dom.failurePic.style.display = 'block';
    dom.failurePic.style.maxWidth = '100vw';
    dom.failurePic.style.maxHeight = '100vh';
    dom.failurePic.style.width = '100vw';
    dom.failurePic.style.height = '100vh';
    dom.failurePic.style.objectFit = 'cover';
    dom.failurePic.style.borderRadius = '0';
    dom.failurePic.style.border = 'none';
    dom.modal.style.padding = '0';
    document.querySelector('.modal-box').style.padding = '0';
    document.querySelector('.modal-box').style.border = 'none';
    document.querySelector('.modal-box').style.background = 'none';
    document.querySelector('.modal-box').style.borderRadius = '0';
    setTimeout(() => {
      dom.modal.style.display = 'none';
      dom.modalTitle.style.display = '';
      dom.modalMsg.style.display = '';
      dom.countdown.style.display = '';
      dom.failurePic.style = '';
      dom.modal.style.padding = '';
      document.querySelector('.modal-box').style = '';
      init();
    }, 500);
  }
}

function startAutoRestart(seconds) {
  let t = seconds;
  dom.countdown.innerText = `Restarting in ${t}...`;
  autoRestartInterval = setInterval(() => {
    t--;
    dom.countdown.innerText = t > 0 ? `Restarting in ${t}...` : '';
  }, 1000);
  autoRestartTimeout = setTimeout(init, seconds * 1000);
}

function clearAutoRestart() {
  if (autoRestartTimeout) clearTimeout(autoRestartTimeout);
  if (autoRestartInterval) clearInterval(autoRestartInterval);
  autoRestartTimeout = autoRestartInterval = null;
  dom.countdown.innerText = '';
}

function changeDifficulty(tier) {
  currentTier = tier;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${tier}`).classList.add('active');
  init();
}

let longPressTimer = null;
let longPressTriggered = false;
let isDragAction = false; // true = drag-digging, false = drag-flagging
let isDragging = false;
const LONG_PRESS_MS = 200;

dom.grid.addEventListener('mousedown', e => {
  const c = e.target.closest('.cell');
  if (!c) return;
  const i = parseInt(c.dataset.index);

  if (state.isHintMode) { useHint(i); return; }
  if (e.button === 2) { toggleFlag(i); return; }
  if (e.button !== 0) return;

  if (state.grid[i].revealed) { chord(i); return; }

  longPressTriggered = false;
  isDragging = false;

  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    isDragging = true;
    // long press does opposite of current mode
    isDragAction = currentMode === 'flag' ? 'dig' : 'flag';
    if (isDragAction === 'dig') reveal(i);
    else toggleFlag(i);
  }, LONG_PRESS_MS);
});

dom.grid.addEventListener('mouseover', e => {
  if (!isDragging) return;
  const c = e.target.closest('.cell');
  if (!c) return;
  const i = parseInt(c.dataset.index);
  if (state.grid[i].revealed) return;
  if (isDragAction === 'dig') reveal(i);
  else if (!state.grid[i].flagged) toggleFlag(i);
});

dom.grid.addEventListener('mouseup', e => {
  clearTimeout(longPressTimer);
  isDragging = false;
  if (longPressTriggered) { longPressTriggered = false; return; }
  const c = e.target.closest('.cell');
  if (!c || e.button !== 0) return;
  const i = parseInt(c.dataset.index);
  if (state.grid[i].revealed) return;
  if (currentMode === 'flag') toggleFlag(i);
  else reveal(i);
});

window.addEventListener('mouseup', () => {
  clearTimeout(longPressTimer);
  isDragging = false;
  longPressTriggered = false;
});

window.addEventListener('contextmenu', e => e.preventDefault());

// Touch support for mobile
dom.grid.addEventListener('touchstart', e => {
  const c = e.target.closest('.cell');
  if (!c) return;
  const i = parseInt(c.dataset.index);
  if (state.grid[i].revealed) { chord(i); return; }
  longPressTriggered = false;
  isDragging = false;
  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    isDragging = true;
    isDragAction = currentMode === 'flag' ? 'dig' : 'flag';
    if (isDragAction === 'dig') reveal(i);
    else toggleFlag(i);
  }, LONG_PRESS_MS);
}, { passive: true });

dom.grid.addEventListener('touchmove', e => {
  if (!isDragging) { clearTimeout(longPressTimer); return; }
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const c = el && el.closest('.cell');
  if (!c) return;
  const i = parseInt(c.dataset.index);
  if (state.grid[i].revealed) return;
  if (isDragAction === 'dig') reveal(i);
  else if (!state.grid[i].flagged) toggleFlag(i);
}, { passive: true });

dom.grid.addEventListener('touchend', e => {
  clearTimeout(longPressTimer);
  isDragging = false;
  if (longPressTriggered) { longPressTriggered = false; return; }
  const c = e.target.closest('.cell');
  if (!c) return;
  e.preventDefault();
  const i = parseInt(c.dataset.index);
  if (state.grid[i].revealed) return;
  if (currentMode === 'flag') toggleFlag(i);
  else reveal(i);
});
dom.resetBtn.addEventListener('click', init);
window.onload = init;
</script>
</body>
</html>
